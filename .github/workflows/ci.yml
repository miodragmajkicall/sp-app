name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: |
          docker compose up -d
          docker compose ps

      - name: Wait for Postgres
        shell: bash
        run: |
          echo "Waiting for Postgres..."
          for i in {1..60}; do
            if docker compose exec -T db pg_isready -U postgres >/dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 2
          done
          docker compose logs db || true
          exit 1

      - name: Wait for API health
        shell: bash
        run: |
          echo "Waiting for API /health..."
          for i in {1..120}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 1
          done
          docker compose logs api || true
          exit 1

      - name: Run migrations
        run: |
          docker compose exec -T api alembic upgrade head

      - name: Check DB health
        shell: bash
        run: |
          echo "Checking /db/health..."
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/db/health >/dev/null; then
              echo "DB health OK"
              exit 0
            fi
            sleep 2
          done
          docker compose logs api db || true
          exit 1

      - name: Run backend tests inside API container
        run: |
          docker compose exec -T api pytest -q

      - name: Print logs on failure
        if: failure()
        run: |
          docker compose logs --tail=200 api db || true

      - name: Shutdown stack
        if: always()
        run: |
          docker compose down -v

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Frontend build
        run: |
          cd frontend
          npm run build